# ─── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_global:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=booking:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/s;

# ─── Connection limiting (DDoS protection) ─────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── Upstream: Node.js app (can be extended to multiple nodes) ─────────────────
upstream sems_backend {
    least_conn;
    server sems-app:8080;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name suvaialaya.com www.suvaialaya.com;
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name suvaialaya.com www.suvaialaya.com;

    # ─── SSL Configuration ───────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/suvaialaya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suvaialaya.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (6 months — preload-ready)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # ─── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── GZIP Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── DDoS Protection ─────────────────────────────────────────────────────
    limit_conn conn_limit 50;

    # ─── Client limits ────────────────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 75s;
    send_timeout 30s;

    # ─── Razorpay Webhook (high throughput, bypasses stricter limits) ─────────
    location /api/payments/webhook {
        limit_req zone=webhook burst=20 nodelay;
        proxy_pass http://sems_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Auth endpoints (strict rate limit) ─────────────────────────────────
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://sems_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Booking endpoints (prevent seat-hoarding bots) ─────────────────────
    location /api/bookings {
        limit_req zone=booking burst=5 nodelay;
        proxy_pass http://sems_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── All other API routes ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_global burst=50 nodelay;
        proxy_pass http://sems_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }

    # ─── Static assets (React SPA — aggressive caching) ──────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://sems_backend;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_set_header Host $host;
    }

    # ─── SPA fallback — serve index.html for all routes ──────────────────────
    location / {
        proxy_pass http://sems_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
